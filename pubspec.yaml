name: conectapro
description: App ConectaPro - conexão entre clientes e profissionais.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  firebase_core: ^4.6.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.2.0
  url_launcher: ^6.3.2
  http: ^1.6.0
  fl_chart: ^1.2.0
  geolocator: ^14.0.2
  google_maps_flutter: ^2.17.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  video_player: ^2.11.1
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^18.0.1

  # ✅ QR (não quebra nada, só UI)
  qr_flutter: ^4.1.0
  image_picker: ^1.2.2
  firebase_storage: ^13.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/videos/

# ✅ Config ícone
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
