name: conectapro
description: App ConectaPro - conexão entre clientes e profissionais.
publish_to: 'none'

version: 1.0.1+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2

  firebase_core: ^4.6.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.3.0
  firebase_storage: ^13.4.2

  google_sign_in: ^6.2.1

  package_info_plus: ^8.0.2

  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5
  http: ^1.6.0

  fl_chart: ^1.2.0
  geolocator: ^14.0.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  video_player: ^2.11.1
  flutter_local_notifications: ^18.0.1
  qr_flutter: ^4.1.0
  image_picker: ^1.2.2

  flutter_launcher_icons: ^0.14.4
  firebase_crashlytics: ^5.2.4
  firebase_analytics: ^12.4.3
  firebase_performance: ^0.11.4+3

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/videos/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/icon.png
